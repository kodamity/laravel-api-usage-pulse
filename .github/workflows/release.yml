name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3 — without v prefix)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    uses: kodamity/.github/.github/workflows/release.yml@main
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      tag-prefix: v
